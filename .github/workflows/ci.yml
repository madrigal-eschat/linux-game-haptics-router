name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
      - run: cargo fmt --all -- --check

  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
        with:
          target: ${{ matrix.target }}
      - run: cargo check --workspace --target ${{ matrix.target }}

  clippy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
        with:
          target: ${{ matrix.target }}
      # --exclude haptics-probe-ebpf: --all-targets builds a --test harness
      # for every member, which links std. haptics-probe-ebpf is
      # #![no_std]#![no_main] with its own #[panic_handler], which conflicts
      # with std's (E0152 duplicate lang item) as soon as anything tries to
      # link it into a std test binary. It still gets type-checked by the
      # `check` job and fully built (via aya-build) by `build`/`haptics-probe`'s
      # build.rs — it just isn't clippy'd directly in this job.
      - run: cargo clippy --workspace --exclude haptics-probe-ebpf --all-targets --target ${{ matrix.target }} -- -D warnings

  # aarch64 binaries can't execute on the x86_64 runner, so tests only run
  # natively; the aarch64 target is still exercised by check/clippy/build.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
      - run: cargo test --workspace --exclude haptics-probe-ebpf

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
        with:
          target: ${{ matrix.target }}
      - run: cargo build --workspace --release --target ${{ matrix.target }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --exclude haptics-probe-ebpf --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
