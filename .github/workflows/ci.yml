name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/rust-bpf-setup
      - run: cargo fmt --all -- --check

  # linux-game-haptics-router-ebpf is excluded from every command below except the real
  # `build` of linux-game-haptics-router itself. It's #![no_std]#![no_main] with its own
  # #[panic_handler] and can only be compiled correctly through aya-build's
  # bpfel-unknown-none cross-compile (invoked from linux-game-haptics-router's build.rs).
  # Building/checking/testing it directly as a normal workspace member for a
  # real target (x86_64/aarch64-unknown-linux-gnu) links std, which collides
  # with its panic_handler (E0152 duplicate lang item `panic_impl`) — that
  # collision doesn't need --tests/--all-targets to trigger, plain `cargo
  # check`/`build` hit it too. Excluding it here loses no coverage: the real
  # cross-compiled bytecode still gets produced by linux-game-haptics-router's build.rs
  # regardless of whether linux-game-haptics-router-ebpf is also a top-level unit of the
  # outer cargo invocation.
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/rust-bpf-setup
        with:
          target: ${{ matrix.target }}
      - run: cargo check --workspace --exclude linux-game-haptics-router-ebpf --exclude linux-game-haptics-router-e2e --target ${{ matrix.target }}

  clippy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/rust-bpf-setup
        with:
          target: ${{ matrix.target }}
      - run: cargo clippy --workspace --exclude linux-game-haptics-router-ebpf --exclude linux-game-haptics-router-e2e --all-targets --target ${{ matrix.target }} -- -D warnings

  # aarch64 binaries can't execute on the x86_64 runner, so tests only run
  # natively; the aarch64 target is still exercised by check/clippy/build.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/rust-bpf-setup
      - run: cargo test --workspace --exclude linux-game-haptics-router-ebpf --exclude linux-game-haptics-router-e2e

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/rust-bpf-setup
        with:
          target: ${{ matrix.target }}
      - run: cargo build --workspace --exclude linux-game-haptics-router-ebpf --exclude linux-game-haptics-router-e2e --release --target ${{ matrix.target }}

  coverage:
    runs-on: ubuntu-latest
    # cargo-llvm-cov's -C instrument-coverage flags leak into the nested
    # nightly build aya-build shells out to for the real bpfel-unknown-none
    # cross-compile (linux-game-haptics-router's build.rs), and profiler_builtins isn't
    # available for that build-std=core/custom-target combo (E0463). Skip
    # the real eBPF cross-compile for coverage runs — see build.rs; coverage
    # never loads the resulting bytes, it just needs the include_bytes_aligned!
    # in src/ebpf.rs to find *some* file there.
    env:
      SKIP_EBPF_BUILD: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/rust-bpf-setup
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --exclude linux-game-haptics-router-ebpf --exclude linux-game-haptics-router-e2e --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
          - runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    # 30 (not 20): the aarch64 runner has no KVM, so its VM boots under much
    # slower TCG software emulation.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
      - run: sudo apt-get update && sudo apt-get install -y qemu-system cloud-image-utils
      # The runner user isn't in the kvm group by default, so /dev/kvm exists
      # but isn't accessible even when present (e.g. ubuntu-latest).
      - run: '[ -e /dev/kvm ] && sudo chmod 666 /dev/kvm || true'
      - run: ./e2e/run.sh
