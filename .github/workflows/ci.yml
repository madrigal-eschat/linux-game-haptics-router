name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
      - run: cargo fmt --all -- --check

  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
        with:
          target: ${{ matrix.target }}
      - run: cargo check --workspace --target ${{ matrix.target }}

  clippy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
        with:
          target: ${{ matrix.target }}
      - run: cargo clippy --workspace --all-targets --target ${{ matrix.target }} -- -D warnings

  # aarch64 binaries can't execute on the x86_64 runner, so tests only run
  # natively; the aarch64 target is still exercised by check/clippy/build.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
      - run: cargo test --workspace

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
        with:
          target: ${{ matrix.target }}
      - run: cargo build --workspace --release --target ${{ matrix.target }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-bpf-setup
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
