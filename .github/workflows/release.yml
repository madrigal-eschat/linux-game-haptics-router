name: Release

# Runs semantic-release on every push to main. It inspects commits since the
# last tag, and if any warrant a release, bumps every crate's Cargo.toml via
# cargo-edit, updates CHANGELOG.md, commits, tags (vX.Y.Z), and publishes a
# GitHub Release with generated notes. Tagging that release is what triggers
# build-release.yml to attach platform binaries to it.
#
# Requires a `RELEASE_TOKEN` repo secret (PAT with `repo` scope, or a GitHub
# App installation token). Tags/commits pushed with the default GITHUB_TOKEN
# do NOT trigger other workflows (GitHub's anti-recursion guard), so
# build-release.yml would never fire on the tag this job creates.
on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-edit --locked

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - run: |
          npm install --no-save \
            semantic-release@23 \
            @semantic-release/changelog@6 \
            @semantic-release/exec@6 \
            @semantic-release/git@10 \
            conventional-changelog-conventionalcommits@7

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
