# Run `pre-commit install --hook-type pre-commit --hook-type commit-msg` once
# after cloning so both the file checks and the commit-message check fire.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        # --exclude linux-game-haptics-router-ebpf: it's #![no_std]#![no_main] with its
        # own #[panic_handler] and can only build correctly through
        # aya-build's bpfel-unknown-none cross-compile (invoked from
        # linux-game-haptics-router's build.rs, which still runs regardless of this
        # exclude). Building it directly for the host target links std and
        # collides with its panic_handler (E0152 duplicate lang item).
        entry: cargo check --workspace --exclude linux-game-haptics-router-ebpf
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        # same E0152 reasoning as cargo-check above, plus --all-targets
        # would additionally try to build a --test harness for every member.
        entry: cargo clippy --workspace --exclude linux-game-haptics-router-ebpf --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
