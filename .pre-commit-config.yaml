# Run `pre-commit install --hook-type pre-commit --hook-type commit-msg` once
# after cloning so both the file checks and the commit-message check fire.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        # --exclude haptics-probe-ebpf: --all-targets builds a --test harness
        # for every member, which links std. haptics-probe-ebpf is
        # #![no_std]#![no_main] with its own #[panic_handler], which
        # conflicts with std's (E0152 duplicate lang item).
        entry: cargo clippy --workspace --exclude haptics-probe-ebpf --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
